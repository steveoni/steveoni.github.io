---
layout: default
---
<style>
  /* ── post layout ──────────────────────────────────────── */
  .post-header {
    margin-bottom: 2.75rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .post-header h1 {
    font-size: 1.55rem;
    font-weight: 500;
    line-height: 1.3;
    letter-spacing: -0.015em;
    margin-bottom: 0.75rem;
    color: var(--text); /* explicit — ensures full contrast */
  }
  .post-header .post-meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .post-header .post-date {
    font-size: 0.8rem;
    font-family: "DM Mono", monospace;
    color: var(--muted);
  }
  .post-header .post-category {
    font-size: 0.68rem;
    font-family: "DM Mono", monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
    border: 1px solid currentColor;
    padding: 0.1em 0.45em;
    border-radius: 3px;
    opacity: 0.85;
  }

  /* ── post body typography ─────────────────────────────── */
  .post-content {
    /* slightly warmer text for long-form reading */
    --text: #ebebе7;
  }
  .post-content > * + * { margin-top: 0; }

  .post-content p {
    font-size: 1rem;
    line-height: 1.85;
    color: var(--text);
    margin: 1rem 0;
  }

  /* headings inside post — stronger hierarchy */
  .post-content h2 {
    font-size: 1.1rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin: 3rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .post-content h3 {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    margin: 2rem 0 0.5rem;
  }
  .post-content h4 {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--muted);
    margin: 1.5rem 0 0.4rem;
  }

  /* lists */
  .post-content ul,
  .post-content ol {
    margin: 1rem 0 1rem 1.5rem;
    color: var(--text);
  }
  .post-content li { margin-bottom: 0.35rem; line-height: 1.8; }

  /* blockquote — improved contrast */
  .post-content blockquote {
    border-left: 2px solid var(--accent);
    padding: 0.5rem 1.1rem;
    background: rgba(168, 197, 160, 0.06);
    border-radius: 0 6px 6px 0;
    margin: 1.5rem 0;
  }
  .post-content blockquote p {
    color: #b4b4b0;   /* AA on dark bg */
    font-style: italic;
    margin: 0;
  }

  /* inline code — ensure contrast */
  .post-content code {
    color: #c3e88d;   /* soft lime — legible on #131315 */
  }

  /* ── images — accessible & constrained ───────────────── */
  .post-content img {
    max-width: 100%;
    height: auto;
    max-height: 520px;
    object-fit: contain;
    display: block;
    margin: 2rem auto;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface); /* letterbox bg when image has alpha */
  }

  /* figure + figcaption for authored images */
  .post-content figure {
    margin: 2rem 0;
  }
  .post-content figure img {
    margin: 0 auto 0.6rem;
  }
  .post-content figcaption {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    font-style: italic;
    font-family: "DM Mono", monospace;
  }

  /* ── post footer nav ──────────────────────────────────── */
  .post-footer {
    margin-top: 4rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.75rem;
  }
  .post-footer a {
    font-size: 0.83rem;
    color: var(--muted);
    font-family: "DM Mono", monospace;
    transition: color 0.15s;
  }
  .post-footer a:hover {
    color: var(--accent);
    text-decoration: none;
  }
</style>

<article aria-labelledby="post-title">
  <header class="post-header">
    <h1 id="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time class="post-date" datetime="{{ page.date | date: '%Y-%m-%d' }}">
        {{ page.date | date: "%B %-d, %Y" }}
      </time>
      {% for cat in page.categories %}
      <span class="post-category">{{ cat }}</span>
      {% endfor %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a href="/blog">← all writing</a>
    {% if page.categories.first %}
    <a href="/blog">{{ page.categories | join: " · " }}</a>
    {% endif %}
  </footer>
</article>
